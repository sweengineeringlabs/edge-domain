[package]
name                   = "edge-llm-prompt"
version                = "0.1.0"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true
authors.workspace      = true
repository.workspace   = true
description = "LLM Prompt domain primitive: template rendering and context management for dynamic prompts"
keywords    = ["llm", "prompt", "template", "context", "sea"]
categories  = ["development-tools"]

[package.metadata.struct-engine]
application_type = "lib"
service_type     = "prompt"

[lib]
path = "main/src/lib.rs"

[dependencies]
thiserror.workspace = true
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
futures.workspace = true
edge-domain-handler.workspace = true
edge-domain-service.workspace = true
edge-domain-security.workspace = true
edge-domain-command.workspace = true

[dev-dependencies]

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
