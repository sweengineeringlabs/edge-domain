[package]
name                   = "edge-llm-reasoning"
version                = "0.1.0"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true
authors.workspace      = true
repository.workspace   = true
description = "LLM Reasoning domain primitive: multi-strategy reasoning patterns (chain-of-thought, tree-of-thought, etc.)"
keywords    = ["llm", "reasoning", "patterns", "strategy", "sea"]
categories  = ["development-tools"]

[package.metadata.arch]
application_type = "lib"
service_type     = "reasoning"

[lib]
path = "main/src/lib.rs"

[dependencies]
thiserror.workspace = true
async-trait.workspace = true
serde.workspace = true
edge-domain-handler.workspace  = true
edge-domain-observer.workspace  = true

[dev-dependencies]
serde_json.workspace = true
futures.workspace = true
edge-domain-security.workspace = true
edge-domain-command.workspace = true

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
