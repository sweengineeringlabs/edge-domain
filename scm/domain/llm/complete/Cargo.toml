[package]
name                   = "edge-llm-complete"
version                = "0.1.0"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true
authors.workspace      = true
repository.workspace   = true
description = "LLM Complete domain primitive: HTTP-level completion port contract (ADR-043)"
keywords    = ["llm", "completion", "streaming", "domain", "sea"]
categories  = ["development-tools"]

[package.metadata.arch]
application_type = "lib"
service_type     = "complete"

[lib]
path = "main/src/lib.rs"

[dependencies]
thiserror.workspace            = true
async-trait.workspace          = true
serde.workspace                = true
serde_json.workspace           = true
futures.workspace              = true
edge-domain-pipeline.workspace = true

[dev-dependencies]
serde_json.workspace  = true
futures.workspace     = true
async-trait.workspace = true
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
