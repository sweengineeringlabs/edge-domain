[package]
name                   = "edge-llm-provider"
version                = "0.1.0"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true
authors.workspace      = true
repository.workspace   = true
description = "LLM Provider domain primitive: execution backend abstraction for LLM reasoning"
keywords    = ["llm", "provider", "execution", "backend", "sea"]
categories  = ["development-tools"]

[package.metadata.struct-engine]
application_type = "lib"
service_type     = "provider"

[lib]
path = "main/src/lib.rs"

[dependencies]
thiserror.workspace = true
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
edge-domain-handler.workspace = true
swe-edge-configbuilder.workspace = true

[dev-dependencies]
serde_json.workspace = true
futures.workspace = true
edge-domain-security.workspace = true
edge-domain-command.workspace = true
tempfile = "3"

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
