[package]
name                   = "edge-domain-agent"
version                = "0.1.0"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true
authors.workspace      = true
repository.workspace   = true
description = "edge-domain — Agent domain primitive: Agent, Skill, AgentManager, AgentRegistry port contracts"
keywords    = ["domain", "agent", "skill", "orchestration", "sea"]
categories  = ["development-tools"]

[package.metadata.struct-engine]
application_type = "lib"
service_type     = "agent"

[lib]
path = "main/src/lib.rs"

[dependencies]
thiserror.workspace = true
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
edge-domain-handler = { workspace = true }
edge-domain-registry = { workspace = true }

[dev-dependencies]
futures.workspace = true
edge-domain-command = { workspace = true }
edge-domain-security = { workspace = true }

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
