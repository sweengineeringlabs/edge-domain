[package]
name                   = "edge-llm-agent"
version                = "0.1.0"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true
authors.workspace      = true
repository.workspace   = true
description = "LLM Agent domain primitive: lifecycle state machine, messaging, tool governance"
keywords    = ["domain", "agent", "skill", "orchestration", "sea"]
categories  = ["development-tools"]

[package.metadata.arch]
application_type = "lib"
service_type     = "agent"

[lib]
path = "main/src/lib.rs"

[dependencies]
thiserror.workspace = true
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
edge-domain-command  = { workspace = true }
edge-domain-handler  = { workspace = true }
edge-domain-observer  = { workspace = true }
edge-domain-registry = { workspace = true }
edge-domain-security = { workspace = true }
edge-domain-pipeline = { workspace = true }
edge-llm-complete = { workspace = true }
edge-llm-provider = { workspace = true }

[dev-dependencies]
futures.workspace = true
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
