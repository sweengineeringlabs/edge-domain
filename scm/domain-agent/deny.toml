# Dependency vulnerability auditing configuration
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = ".cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db/raw/main/db.toml"]
vulnerability = "deny"
unmaintained = "warn"
unsound = "warn"
yanked = "warn"
notice = "warn"
ignore = []

[licenses]
db-path = ".cargo/license-db"
db-urls = ["https://github.com/EmbarkStudios/cargo-deny/raw/main/deny.toml"]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 OR MIT",
]
copyleft = "warn"
blanket = true

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
allow = []
deny = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
