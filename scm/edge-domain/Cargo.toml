[package]
name                   = "edge-domain"
version                = "0.10.0"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true
authors.workspace      = true
repository.workspace   = true
description = "edge — L2 Domain: umbrella crate; activate individual features (handler, event, command …) or `full` for all 14 port contracts"
keywords    = ["domain", "handler", "event-sourcing", "sea", "swe"]
categories  = ["development-tools"]

[package.metadata.struct-engine]
application_type = "lib"
service_type     = "handler"

[lib]
path = "main/src/lib.rs"

[features]
default     = [
    "entity", "valueobject",
    "clock", "validator", "policy",
    "command", "query", "snapshot", "service",
    "repository", "handler", "event",
    "projection", "saga",
]
entity      = ["dep:edge-domain-entity"]
valueobject = ["dep:edge-domain-valueobject"]
clock       = ["dep:edge-domain-clock"]
validator   = ["dep:edge-domain-validator"]
policy      = ["dep:edge-domain-policy"]
command     = ["dep:edge-domain-command"]
query       = ["dep:edge-domain-query"]
snapshot    = ["dep:edge-domain-snapshot"]
service     = ["dep:edge-domain-service"]
repository  = ["dep:edge-domain-repository"]
handler     = ["dep:edge-domain-handler"]
event       = ["dep:edge-domain-event"]
projection  = ["dep:edge-domain-projection", "event"]
saga        = ["dep:edge-domain-saga",        "event", "command"]
security    = []
registry    = ["dep:edge-domain-registry"]
lifecycle   = ["dep:edge-domain-lifecycle"]
full        = [
    "entity", "valueobject",
    "clock", "validator", "policy",
    "command", "query", "snapshot", "service",
    "repository", "handler", "event",
    "projection", "saga",
    "security",
    "registry", "lifecycle",
]

[dependencies]
thiserror.workspace   = true
async-trait.workspace = true
futures.workspace     = true
parking_lot.workspace = true
tokio.workspace       = true
tracing.workspace     = true

edge-domain-entity      = { workspace = true, optional = true }
edge-domain-valueobject = { workspace = true, optional = true }
edge-domain-clock       = { workspace = true, optional = true }
edge-domain-validator   = { workspace = true, optional = true }
edge-domain-policy      = { workspace = true, optional = true }
edge-domain-command     = { workspace = true, optional = true }
edge-domain-query       = { workspace = true, optional = true }
edge-domain-snapshot    = { workspace = true, optional = true }
edge-domain-service     = { workspace = true, optional = true }
edge-domain-repository  = { workspace = true, optional = true }
edge-domain-handler     = { workspace = true, optional = true }
edge-domain-event       = { workspace = true, optional = true }
edge-domain-projection  = { workspace = true, optional = true }
edge-domain-saga        = { workspace = true, optional = true }
edge-domain-registry    = { workspace = true, optional = true }
edge-domain-lifecycle   = { workspace = true, optional = true }
edge-domain-security.workspace = true

[dev-dependencies]
tokio   = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }
futures.workspace                  = true
edge-domain-entity.workspace       = true
edge-domain-valueobject.workspace  = true
edge-domain-clock.workspace        = true
edge-domain-validator.workspace    = true
edge-domain-policy.workspace       = true
edge-domain-command.workspace      = true
edge-domain-query.workspace        = true
edge-domain-snapshot.workspace     = true
edge-domain-service.workspace      = true
edge-domain-repository.workspace   = true
edge-domain-handler.workspace      = true
edge-domain-event.workspace        = true
edge-domain-projection.workspace   = true
edge-domain-saga.workspace         = true
edge-domain-registry.workspace     = true
edge-domain-lifecycle.workspace    = true
edge-domain-security.workspace     = true

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
