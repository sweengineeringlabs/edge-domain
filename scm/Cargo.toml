[workspace]
resolver = "2"
members  = [
    "edge-domain",
    "edge-domain-entity",
    "edge-domain-valueobject",
]

[workspace.package]
edition      = "2021"
license      = "MIT OR Apache-2.0"
rust-version = "1.95"
authors      = ["SWE Engineering Labs"]
repository   = "https://github.com/sweengineeringlabs/edge-domain"

[workspace.lints.rust]
unsafe_code  = "deny"
missing_docs = "warn"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"

[workspace.dependencies]
thiserror   = "2"
async-trait = "0.1"
futures     = "0.3"
parking_lot = "0.12"
tokio       = { version = "1", features = ["sync", "time"] }
tracing     = "0.1"
edge-domain-entity      = { path = "edge-domain-entity" }
edge-domain-valueobject = { path = "edge-domain-valueobject" }
