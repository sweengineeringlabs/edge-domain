[package]
name         = "edge-domain"
version      = "0.8.0"
edition      = "2021"
license      = "MIT OR Apache-2.0"
rust-version = "1.95"
authors      = ["SWE Engineering Labs"]
repository   = "https://github.com/sweengineeringlabs/edge-domain"
description  = "edge — L2 Domain: lean port contracts (Handler, HandlerRegistry, RequestContext, HandlerError) with no infrastructure dependencies"
keywords     = ["domain", "handler", "business-logic", "sea", "swe"]
categories   = ["development-tools"]

[package.metadata.struct-engine]
application_type = "lib"
service_type     = "handler"

[lib]
path = "main/src/lib.rs"

[dependencies]
thiserror   = "2"
async-trait = "0.1"
futures     = "0.3"
parking_lot = "0.12"
tokio       = { version = "1", features = ["sync", "time"] }
tracing     = "0.1"

[dev-dependencies]
tokio   = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
futures = "0.3"

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
