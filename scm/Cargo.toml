[workspace]
resolver = "2"
members  = [
    "edge-domain",
    "edge-domain-entity",
    "edge-domain-valueobject",
    "edge-domain-validator",
    "edge-domain-clock",
    "edge-domain-policy",
    "edge-domain-command",
    "edge-domain-query",
    "edge-domain-snapshot",
    "edge-domain-service",
    "edge-domain-repository",
    "edge-domain-handler",
    "edge-domain-event",
    "edge-domain-projection",
    "edge-domain-saga",
    "edge-domain-security",
]

[workspace.package]
edition      = "2021"
license      = "MIT OR Apache-2.0"
rust-version = "1.95"
authors      = ["SWE Engineering Labs"]
repository   = "https://github.com/sweengineeringlabs/edge-domain"

[workspace.lints.rust]
unsafe_code  = "deny"
missing_docs = "warn"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"

[workspace.dependencies]
thiserror   = "2"
async-trait = "0.1"
futures     = "0.3"
parking_lot = "0.12"
tokio       = { version = "1", features = ["sync", "time"] }
tracing     = "0.1"
edge-domain-entity      = { path = "edge-domain-entity" }
edge-domain-valueobject = { path = "edge-domain-valueobject" }
edge-domain-clock       = { path = "edge-domain-clock" }
edge-domain-validator   = { path = "edge-domain-validator" }
edge-domain-policy      = { path = "edge-domain-policy" }
edge-domain-command     = { path = "edge-domain-command" }
edge-domain-query       = { path = "edge-domain-query" }
edge-domain-snapshot    = { path = "edge-domain-snapshot" }
edge-domain-service     = { path = "edge-domain-service" }
edge-domain-repository  = { path = "edge-domain-repository" }
edge-domain-handler     = { path = "edge-domain-handler" }
edge-domain-event       = { path = "edge-domain-event" }
edge-domain-projection  = { path = "edge-domain-projection" }
edge-domain-saga        = { path = "edge-domain-saga" }
edge-domain-security    = { path = "edge-domain-security" }
