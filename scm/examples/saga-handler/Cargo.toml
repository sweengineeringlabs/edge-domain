[package]
name                   = "edge-application-saga-handler-example"
version                = "0.1.0"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true
authors.workspace      = true
repository.workspace   = true
description = "Handler holding an injected Saga via Arc<Mutex<S>>, per-call event carried through Self::Request — the generic-per-type port wiring pattern, issue #149. Also documents why SagaStore::get()'s immutable-borrow return type cannot support the get-then-handle mutation path."
publish = false

[[bin]]
name = "saga_handler"
path = "src/main.rs"

[dependencies]
async-trait.workspace               = true
futures.workspace                   = true
parking_lot.workspace               = true
edge-application-base.workspace     = true
edge-application-handler.workspace  = true
edge-application-command.workspace  = true
edge-application-observer.workspace = true
edge-application-saga.workspace     = true
edge-security-runtime.workspace     = true

[dependencies.tokio]
workspace = true
features  = ["macros", "rt", "rt-multi-thread"]

[lints.rust]
unsafe_code = "deny"
