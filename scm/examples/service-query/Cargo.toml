[package]
name                   = "edge-application-service-query-example"
version                = "0.1.0"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true
authors.workspace      = true
repository.workspace   = true
description = "AuthHandler riding infra via Query through ordinary constructor injection — no trait changes, no deviation from the architecture"
publish = false

[[bin]]
name = "service_query"
path = "src/main.rs"

[dependencies]
async-trait.workspace               = true
futures.workspace                   = true
edge-application-base.workspace     = true
edge-application-handler.workspace  = true
edge-application-command.workspace  = true
edge-application-observer.workspace = true
edge-application-query.workspace    = true
edge-security-runtime.workspace     = true

[dependencies.tokio]
workspace = true
features  = ["macros", "rt", "rt-multi-thread"]

[lints.rust]
unsafe_code = "deny"
