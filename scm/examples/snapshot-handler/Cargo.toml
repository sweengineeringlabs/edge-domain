[package]
name                   = "edge-application-snapshot-handler-example"
version                = "0.1.0"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true
authors.workspace      = true
repository.workspace   = true
description = "Handler holding an injected SnapshotStore<AggregateId, Snap> via constructor injection, aggregate id/version carried through Self::Request — the generic-per-type port wiring pattern, issue #149"
publish = false

[[bin]]
name = "snapshot_handler"
path = "src/main.rs"

[dependencies]
async-trait.workspace               = true
futures.workspace                   = true
edge-application-base.workspace     = true
edge-application-handler.workspace  = true
edge-application-command.workspace  = true
edge-application-observer.workspace = true
edge-application-snapshot.workspace = true
edge-security-runtime.workspace     = true

[dependencies.tokio]
workspace = true
features  = ["macros", "rt", "rt-multi-thread"]

[lints.rust]
unsafe_code = "deny"
