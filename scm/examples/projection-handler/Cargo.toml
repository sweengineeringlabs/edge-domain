[package]
name                   = "edge-application-projection-handler-example"
version                = "0.1.0"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true
authors.workspace      = true
repository.workspace   = true
description = "Handler holding an injected Projection<Event, ReadModel> via Arc<Mutex<P>>, events carried through Self::Request — the generic-per-type port wiring pattern, issue #149"
publish = false

[[bin]]
name = "projection_handler"
path = "src/main.rs"

[dependencies]
async-trait.workspace                = true
futures.workspace                    = true
parking_lot.workspace                = true
edge-application-base.workspace      = true
edge-application-handler.workspace   = true
edge-application-command.workspace   = true
edge-application-observer.workspace  = true
edge-application-projection.workspace = true
edge-security-runtime.workspace      = true

[dependencies.tokio]
workspace = true
features  = ["macros", "rt", "rt-multi-thread"]

[lints.rust]
unsafe_code = "deny"
