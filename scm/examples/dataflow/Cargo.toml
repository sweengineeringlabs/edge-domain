[package]
name                   = "edge-application-dataflow-example"
version                = "0.1.0"
edition.workspace      = true
license.workspace      = true
rust-version.workspace = true
authors.workspace      = true
repository.workspace   = true
description = "Runnable trace of where HandlerContext does/does not reach across the Handler/Service/Command boundary — see docs/3-design/dataflow.md sections 2 and 6"
publish = false

[[bin]]
name = "dataflow"
path = "src/main.rs"

[dependencies]
async-trait.workspace = true
futures.workspace     = true
edge-application-base.workspace     = true
edge-application-handler.workspace  = true
edge-application-service.workspace  = true
edge-application-command.workspace  = true
edge-application-observer.workspace = true
edge-security-runtime.workspace     = true

[dependencies.tokio]
workspace = true
features  = ["macros", "rt", "rt-multi-thread"]

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
