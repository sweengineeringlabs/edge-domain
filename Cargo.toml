[package]
name = "edge-domain"
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/sweengineeringlabs/edge"
authors = ["SWE Engineering Labs"]
rust-version = "1.75"
description = "edge — L2 Domain: business logic contracts (Handler, HandlerRegistry)"
keywords = ["domain", "handler", "business-logic", "sea", "swe"]
categories = ["development-tools"]

[dependencies]
thiserror = "2"
async-trait = "0.1"
parking_lot = "0.12"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }

[package.metadata.struct-engine]
application_type = "lib"

[lib]
path = "src/lib.rs"
